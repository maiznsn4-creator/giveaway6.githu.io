<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Number 1-1000</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #31344b;
            --main-accent: #6c5ce7;
            --shadow-raised: 9px 9px 18px #a3b1c6, -9px -9px 18px #ffffff;
            --shadow-pressed: inset 6px 6px 12px #a3b1c6, inset -6px -6px 12px #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { width: 100%; max-width: 400px; }
        .card { background: var(--bg-color); border-radius: 40px; padding: 30px 20px; box-shadow: var(--shadow-raised); text-align: center; }
        h2 { font-family: 'Moul'; font-size: 18px; color: var(--main-accent); margin-bottom: 10px; }
        .hint { font-size: 12px; opacity: 0.8; margin-bottom: 20px; }
        
        /* Channel Grid */
        .channel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .chan-btn { background: var(--bg-color); padding: 12px; border-radius: 15px; box-shadow: var(--shadow-raised); text-decoration: none; color: var(--text-color); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .chan-btn i { color: #0088cc; }

        /* Input Area */
        #game-area { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .input-box { width: 100%; padding: 18px; border-radius: 20px; border: none; background: var(--bg-color); box-shadow: var(--shadow-pressed); text-align: center; font-size: 24px; font-weight: bold; color: var(--main-accent); margin-bottom: 20px; outline: none; }
        
        .btn-action { width: 100%; padding: 18px; border-radius: 20px; border: none; background: var(--main-accent); color: white; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 5px 5px 15px rgba(108, 92, 231, 0.4); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- Step 1: Verification -->
        <div id="verify-area">
            <i class="fas fa-user-check" style="font-size: 40px; color: var(--main-accent); margin-bottom: 15px;"></i>
            <h2>ផ្ទៀងផ្ទាត់សមាជិក</h2>
            <p class="hint">សូមចូលរួមទាំង ៨ ឆានែល ដើម្បីលេង</p>
            <div class="channel-grid">
                <a href="https://t.me/Select_Store1" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> CH 1</a>
                <a href="https://t.me/Select_Store2" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> CH 2</a>
                <a href="https://t.me/Sopheakbothstore" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> CH 3</a>
                <a href="https://t.me/denstore197" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> CH 4</a>
                <a href="https://t.me/elcystoree" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> CH 5</a>
                <a href="https://t.me/wlwmatcha" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> CH 6</a>
                <a href="https://t.me/kagurastore10" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> CH 7</a>
                <a href="https://t.me/Toladiy168" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> CH 8</a>
            </div>
            <button class="btn-action" onclick="checkAllChannels()">ពិនិត្យការចូលរួម</button>
        </div>

        <!-- Step 2: Game Area -->
        <div id="game-area">
            <i class="fas fa-dice-d20" style="font-size: 40px; color: #ff4757; margin-bottom: 15px;"></i>
            <h2>ជ្រើសរើសលេខសំណាង</h2>
            <p class="hint">បំពេញលេខពី 1 ដល់ 1000 (មិនឱ្យស្ទួនគ្នា)</p>
            <input type="number" id="luckynumber" class="input-box" placeholder="???" min="1" max="1000">
            <button class="btn-action" onclick="submitNumber()">បញ្ជាក់លេខសំណាង</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyD0CoOErw8unJ2lGF3K4BqTAnq0eFq3ycI",
        authDomain: "myessayapp.firebaseapp.com",
        databaseURL: "https://myessayapp-default-rtdb.firebaseio.com",
        projectId: "myessayapp",
        storageBucket: "myessayapp.firebasestorage.app",
        messagingSenderId: "410054064875",
        appId: "1:410054064875:web:7d073851f478564eb39cae"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const BOT_TOKEN = "8212122943:AAFOREIno5CXRklS_X9Kiwz6iAput2zExtI";
    const LOG_GROUP = "-1003546587142";
    const CHANNELS = [
        "-1002259615654", "-1001844015273", "-1003900437296", "-1003732869251", 
        "-1003163059635", "-1003895190674", "-1003298928003", "-1003644503612"
    ];

    const user = tg.initDataUnsafe.user;

    async function checkAllChannels() {
        if (!user) return Swal.fire('Error', 'សូមបើកក្នុង Telegram', 'error');
        Swal.fire({ title: 'កំពុងពិនិត្យ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        let joined = 0;
        for (const id of CHANNELS) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=${id}&user_id=${user.id}`);
                const data = await res.json();
                if (data.ok && ['member','administrator','creator'].includes(data.result.status)) joined++;
            } catch(e) {}
        }
        Swal.close();

        if (joined < 8) {
            Swal.fire('មិនទាន់គ្រប់', `បងនៅខ្វះ ${8-joined} ឆានែលទៀត!`, 'warning');
        } else {
            document.getElementById('verify-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
        }
    }

    async function submitNumber() {
        const num = document.getElementById('luckynumber').value;
        if (!num || num < 1 || num > 1000) return Swal.fire('ខុសទម្រង់', 'សូមជ្រើសរើសលេខចន្លោះពី 1-1000', 'error');

        Swal.fire({ title: 'កំពុងត្រួតពិនិត្យលេខ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        // Check Unique in Firebase
        const snapshot = await db.ref('lucky_numbers/' + num).once('value');
        if (snapshot.exists()) {
            Swal.fire('លេខនេះមានគេយកហើយ', 'សូមប្តូរជ្រើសរើសលេខផ្សេងទៀត!', 'warning');
        } else {
            // Save to Firebase
            await db.ref('lucky_numbers/' + num).set({
                userId: user.id,
                name: user.first_name,
                time: new Date().toISOString()
            });

            // Send Log to Group
            const msg = `
🎯 **អ្នកចូលរួមថ្មី (Random 1-1000)**
━━━━━━━━━━━━━━━━━━
👤 **ឈ្មោះ:** ${user.first_name}
🆔 **ID:** \`${user.id}\`
🔢 **លេខសំណាង:** \`${num}\`
━━━━━━━━━━━━━━━━━━
            `;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: LOG_GROUP, text: msg, parse_mode: 'Markdown' })
            });

            Swal.fire({
                icon: 'success',
                title: 'ជោគជ័យ!',
                text: `លេខ ${num} ត្រូវបានកត់ត្រាទុកសម្រាប់បងហើយ!`,
                confirmButtonColor: '#6c5ce7'
            }).then(() => tg.close());
        }
    }
</script>
</body>
</html>
