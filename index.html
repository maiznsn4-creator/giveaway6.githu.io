<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Your Reward</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #31344b;
            --main-accent: #6c5ce7;
            --shadow-raised: 9px 9px 18px #a3b1c6, -9px -9px 18px #ffffff;
            --shadow-pressed: inset 6px 6px 12px #a3b1c6, inset -6px -6px 12px #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }

        .container { width: 100%; max-width: 400px; }
        .card { background: var(--bg-color); border-radius: 40px; padding: 30px 20px; box-shadow: var(--shadow-raised); text-align: center; }

        .icon-box { 
            width: 80px; height: 80px; background: var(--bg-color); margin: 0 auto 15px;
            border-radius: 50%; box-shadow: var(--shadow-raised);
            display: flex; align-items: center; justify-content: center; font-size: 35px; color: var(--main-accent);
        }

        h2 { font-family: 'Moul'; font-size: 18px; color: var(--main-accent); margin-bottom: 10px; }
        .hint { font-size: 12px; opacity: 0.8; margin-bottom: 25px; line-height: 1.6; }

        /* Gatekeeper (Channel Area) */
        #channel-area { display: block; }
        .channel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .chan-btn { 
            background: var(--bg-color); padding: 15px; border-radius: 18px; 
            box-shadow: var(--shadow-raised); text-decoration: none; color: var(--text-color);
            font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .chan-btn:active { box-shadow: var(--shadow-pressed); transform: scale(0.96); }
        .chan-btn i { color: #0088cc; font-size: 16px; }

        /* Registration Area (Hidden initially) */
        #register-area { display: none; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .info-list { background: var(--bg-color); border-radius: 25px; padding: 20px; box-shadow: var(--shadow-pressed); margin-bottom: 25px; text-align: left; }
        .info-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; border-bottom: 1px solid rgba(0,0,0,0.03); padding-bottom: 8px; }
        .info-item:last-child { border: none; margin-bottom: 0; }
        .info-item span { opacity: 0.6; }

        .price-tag { font-size: 22px; font-weight: 800; color: #ff4757; margin-bottom: 25px; display: block; }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: var(--main-accent); color: white; font-weight: bold; font-size: 16px;
            cursor: pointer; box-shadow: 5px 5px 15px rgba(108, 92, 231, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="icon-box"><i class="fas fa-gift"></i></div>
        
        <!-- ផ្ទាំងទី១៖ បង្ខំឱ្យចូល Channel -->
        <div id="channel-area">
            <h2>ចែកលុយសមាជិក</h2>
            <p class="hint">សូមចូលរួមទាំង ៦ ឆានែលខាងក្រោមសិន<br>ទើបអាចចុះឈ្មោះទទួលលុយបាន!</p>
            
            <div class="channel-grid">
                <a href="https://t.me/Select_Store1" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> Channel 1</a>
                <a href="https://t.me/Select_Store2" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> Channel 2</a>
                <a href="https://t.me/Sopheakbothstore" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> Channel 3</a>
                <a href="https://t.me/denstore197" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> Channel 4</a>
                <a href="https://t.me/elcystoree" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> Channel 5</a>
                <a href="https://t.me/wlwmatcha" target="_blank" class="chan-btn"><i class="fab fa-telegram"></i> Channel 6</a>
            </div>

            <button class="btn-action" onclick="verifyMembership()">
                <i class="fas fa-user-check"></i> ពិនិត្យការចូលរួម
            </button>
        </div>

        <!-- ផ្ទាំងទី២៖ កន្លែងចុះឈ្មោះ (លោតមកពេល Join គ្រប់) -->
        <div id="register-area">
            <h2>ចុះឈ្មោះទទួលលុយ</h2>
            <p class="hint" style="color: #2ecc71;">អ្នកបានចូលរួមគ្រប់ឆានែលរួចរាល់ហើយ!</p>

            <div class="info-list">
                <div class="info-item"><span>ឈ្មោះ:</span> <b id="tg-name">...</b></div>
                <div class="info-item"><span>លេខសម្គាល់:</span> <b id="tg-id">...</b></div>
                <div class="info-item"><span>ស្ថានភាព:</span> <b style="color: #2ecc71;">បានផ្ទៀងផ្ទាត់</b></div>
            </div>

            <span class="price-tag">រង្វាន់: 10$ ÷ 2 = 5$</span>

            <button class="btn-action" onclick="finalSubmit()">
                <i class="fas fa-paper-plane"></i> បញ្ជាក់ចុះឈ្មោះ
            </button>
        </div>

    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8212122943:AAFOREIno5CXRklS_X9Kiwz6iAput2zExtI";
    const LOG_GROUP = "-1003905865213"; 
    const CHANNELS = ["-1002259615654", "-1001844015273", "-1003900437296", "-1003732869251", "-1003163059635", "-1003895190674"];

    const user = tg.initDataUnsafe.user;

    async function verifyMembership() {
        if (!user) return Swal.fire('Error', 'សូមបើកក្នុង Telegram!', 'error');

        Swal.fire({ title: 'កំពុងពិនិត្យ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        let joinedCount = 0;
        for (const chatId of CHANNELS) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=${chatId}&user_id=${user.id}`);
                const data = await res.json();
                if (data.ok && ['member', 'administrator', 'creator'].includes(data.result.status)) {
                    joinedCount++;
                }
            } catch (e) {}
        }

        Swal.close();

        if (joinedCount < 6) {
            Swal.fire({
                icon: 'warning',
                title: 'មិនទាន់គ្រប់ទេ',
                text: `បងនៅខ្វះ ${6 - joinedCount} ឆានែលទៀតដែលមិនទាន់បាន Join!`,
                confirmButtonColor: '#6c5ce7'
            });
        } else {
            // បើ Join គ្រប់ហើយ បង្ហាញកន្លែងចុះឈ្មោះ
            document.getElementById('channel-area').style.display = 'none';
            document.getElementById('register-area').style.display = 'block';
            
            // បំពេញព័ត៌មានឱ្យគាត់ស្រាប់
            document.getElementById('tg-name').innerText = (user.first_name + " " + (user.last_name || "")).trim();
            document.getElementById('tg-id').innerText = user.id;
        }
    }

    async function finalSubmit() {
        Swal.fire({ title: 'កំពុងចុះឈ្មោះ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const msg = `
💰 **ការចុះឈ្មោះទទួលលុយ**
━━━━━━━━━━━━━━━━━━
👤 **ឈ្មោះ:** ${document.getElementById('tg-name').innerText}
🆔 **ID:** \`${user.id}\`
🔗 **Username:** @${user.username || 'N/A'}
✅ **ស្ថានភាព:** បាន Join គ្រប់ 6 ឆានែល
🎁 **រង្វាន់:** 10$ ÷ 2 = **5$**
━━━━━━━━━━━━━━━━━━
        `;

        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: LOG_GROUP, text: msg, parse_mode: 'Markdown' })
            });

            Swal.fire({
                icon: 'success',
                title: 'រួចរាល់!',
                text: 'ការចុះឈ្មោះរបស់បងទទួលបានជោគជ័យ។',
                timer: 2500,
                showConfirmButton: false
            }).then(() => tg.close());
        } catch (e) {
            Swal.fire('Error', 'មានបញ្ហា! សូមព្យាយាមម្តងទៀត។', 'error');
        }
    }
</script>

</body>
</html>
