<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Lucky Spin | 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&family=Moul&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --main: #ffcc00; --bg: #0f0f1b; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .container { width: 100%; max-width: 420px; text-align: center; padding: 20px; }
        h2 { font-family: 'Moul'; color: var(--main); margin-bottom: 5px; text-shadow: 0 0 15px rgba(255,204,0,0.6); }

        /* Wheel Container */
        .wheel-box { position: relative; width: 340px; height: 340px; margin: 30px auto; border-radius: 50%; border: 12px solid #222; box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px var(--main); background: #222; }
        
        /* អាការៈចង្អុល (The Needle) */
        .needle { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 45px; height: 50px; background: #ff3e3e; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 100; border: 2px solid white; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }

        canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 6s cubic-bezier(0.2, 0, 0.1, 1); }

        /* ប៊ូតុងចុចកណ្តាល */
        .spin-trigger { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: radial-gradient(circle, #fff, #ccc); border-radius: 50%; z-index: 110; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 5px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: 900; color: #111; font-size: 16px; }
        .spin-trigger:active { transform: translate(-50%, -50%) scale(0.9); }

        .btn-verify { width: 100%; padding: 20px; border-radius: 20px; border: none; background: linear-gradient(45deg, var(--main), #ffa500); color: #000; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; box-shadow: 0 10px 20px rgba(255,165,0,0.3); }
        .chan-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .chan-item { background: var(--glass); padding: 15px; border-radius: 15px; text-decoration: none; color: #fff; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .chan-item:hover { background: rgba(255,255,255,0.2); }

        #game-ui { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="verify-ui">
        <h2>ផ្ទៀងផ្ទាត់សមាជិក</h2>
        <div class="chan-list">
            <a href="https://t.me/Select_Store1" target="_blank" class="chan-item">CHANNEL 1</a>
            <a href="https://t.me/Select_Store2" target="_blank" class="chan-item">CHANNEL 2</a>
            <a href="https://t.me/Sopheakbothstore" target="_blank" class="chan-item">CHANNEL 3</a>
            <a href="https://t.me/denstore197" target="_blank" class="chan-item">CHANNEL 4</a>
            <a href="https://t.me/elcystoree" target="_blank" class="chan-item">CHANNEL 5</a>
            <a href="https://t.me/wlwmatcha" target="_blank" class="chan-item">CHANNEL 6</a>
            <a href="https://t.me/heng_shop11" target="_blank" class="chan-item" style="grid-column: span 2;">CHANNEL 7</a>
        </div>
        <button class="btn-verify" onclick="verifyNow()">ផ្ទៀងផ្ទាត់ឥឡូវនេះ</button>
    </div>

    <div id="game-ui">
        <h2>LUCKY SPIN</h2>
        <p id="spin-limit" style="color: var(--main); font-weight: 700; margin-top: 10px;"></p>
        <div class="wheel-box">
            <div class="needle"></div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
            <div class="spin-trigger" id="spinBtn" onclick="doSpin()">SPIN</div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8212122943:AAFOREIno5CXRklS_X9Kiwz6iAput2zExtI";
    const LOG_GROUP = "-1003546587142";
    const SPECIAL_ID = "5010333081";
    const CHANNELS = ["-1002259615654", "-1001844015273", "-1003900437296", "-1003732869251", "-1003163059635", "-1003895190674", "-1003905865213"];

    const rewards = [
        { text: "10$", color: "#d4af37" },
        { text: "0.02$", color: "#222" },
        { text: "5$", color: "#e67e22" },
        { text: "0.05$", color: "#222" },
        { text: "អរគុណ", color: "#444" },
        { text: "0.05$", color: "#222" }
    ];

    let currentSpin = 0;
    const todayStr = new Date().toDateString();

    function draw() {
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const arc = Math.PI / (rewards.length / 2);

        rewards.forEach((r, i) => {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = r.color;
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 300, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "#444";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "900 35px Kantumruy Pro";
            ctx.fillText(r.text, 260, 15);
            ctx.restore();
        });
    }

    async function verifyNow() {
        const user = tg.initDataUnsafe.user;
        tg.CloudStorage.getItem('spin_v5_final', (err, val) => {
            if(val) {
                const data = JSON.parse(val);
                if(data.date === todayStr) currentSpin = data.count;
            }
            if(currentSpin >= 3) return Swal.fire('អស់សិទ្ធិ', 'ថ្ងៃនេះបងលេងអស់ ៣ ដងហើយ!', 'error');
            checkCH();
        });
    }

    async function checkCH() {
        const user = tg.initDataUnsafe.user;
        Swal.fire({ title: 'កំពុងឆែក...', didOpen: () => Swal.showLoading() });
        let count = 0;
        for (let id of CHANNELS) {
            try {
                let r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=${id}&user_id=${user.id}`);
                let d = await r.json();
                if(d.ok && ['member','administrator','creator'].includes(d.result.status)) count++;
            } catch(e) {}
        }
        Swal.close();
        if(count >= 7) {
            document.getElementById('verify-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('spin-limit').innerText = `ឱកាសនៅសល់៖ ${3 - currentSpin} ដង`;
            draw();
        } else {
            Swal.fire('មិនទាន់គ្រប់', `បងនៅខ្វះ ${7-count} ឆានែលទៀត!`, 'warning');
        }
    }

    function doSpin() {
        const user = tg.initDataUnsafe.user;
        const btn = document.getElementById("spinBtn");
        const canvas = document.getElementById("wheelCanvas");
        btn.style.pointerEvents = "none";

        let rand = Math.random() * 100;
        let winIndex = 0;

        // Logic ឈ្នះតាមបងចង់បាន
        if (user.id.toString() === SPECIAL_ID) {
            if (rand < 20) winIndex = 0; // 10$
            else if (rand < 50) winIndex = 2; // 5$
            else winIndex = 3; // 0.05$
        } else {
            if (rand < 50) winIndex = 3; // 0.05$ (50%)
            else if (rand < 80) winIndex = 1; // 0.02$ (30%)
            else winIndex = 4; // អរគុណ (20%)
        }

        // ការគណនាមុំឱ្យចំ ១០០% (បង្វិលថយក្រោយដើម្បីឱ្យចំម្ជុលលើ)
        const degreesPerSlice = 360 / rewards.length;
        const stopAt = 360 - (winIndex * degreesPerSlice) - (degreesPerSlice / 2);
        const totalRotation = 3600 + stopAt; // បង្វិល ១០ ជុំ + មុំគោលដៅ

        canvas.style.transform = `rotate(${totalRotation}deg)`;

        setTimeout(async () => {
            const res = rewards[winIndex].text;
            Swal.fire(res === "អរគុណ" ? 'សោកស្តាយ!' : 'អបអរសាទរ!', res === "អរគុណ" ? 'ព្យាយាមម្តងទៀតណា!' : `បងឈ្នះ ${res}`, res === "អរគុណ" ? 'info' : 'success');
            
            currentSpin++;
            tg.CloudStorage.setItem('spin_v5_final', JSON.stringify({ date: todayStr, count: currentSpin }));
            document.getElementById('spin-limit').innerText = `ឱកាសនៅសល់៖ ${3 - currentSpin} ដង`;

            const msg = `🎰 **LUCKY SPIN**\n👤 Name: ${user.first_name}\n🆔 ID: \`${user.id}\`\n🎁 Win: ${res}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${LOG_GROUP}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);

            if(currentSpin < 3) btn.style.pointerEvents = "auto";
            
            // Reset កងដើម្បីលេងម្តងទៀត (Optionally)
            // canvas.style.transition = 'none';
            // canvas.style.transform = `rotate(${stopAt}deg)`;
        }, 6500);
    }
</script>
</body>
</html>
